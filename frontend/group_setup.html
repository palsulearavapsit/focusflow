<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Group Session Setup - FocusFlow">
    <title>Group Session - FocusFlow</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css?v=10">

    <style>
        .setup-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .setup-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .option-divider {
            position: relative;
            text-align: center;
            margin: 3rem 0;
        }

        .option-divider::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            width: 45%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .option-divider::after {
            content: "";
            position: absolute;
            right: 0;
            top: 50%;
            width: 45%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .option-divider span {
            background: var(--bg-card);
            padding: 0 1rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .code-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 2px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            font-size: 2rem !important;
            text-align: center;
            letter-spacing: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 12px !important;
            padding: 1rem !important;
            transition: all 0.3s;
        }

        .code-input:focus {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3) !important;
            background: rgba(255, 255, 255, 0.08) !important;
        }

        .setup-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .setup-subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 3rem;
        }

        .btn-massive {
            padding: 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 16px;
        }
    </style>
</head>

<body>
    <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="student_dashboard.html" class="sidebar-brand">FocusFlow</a>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item">
                    <a href="student_dashboard.html" class="nav-link">
                        <span>📊</span>
                        <span>Dashboard</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="study.html" class="nav-link">
                        <span>⏱️</span>
                        <span>Start Session</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="group_setup.html" class="nav-link active">
                        <span>👥</span>
                        <span>Group Session</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <div class="container-fluid">
                <div class="setup-container">
                    <div class="setup-card">
                        <h1 class="setup-title">Study Together</h1>
                        <p class="setup-subtitle">Create a private study room or join your friends.</p>

                        <!-- Start Section -->
                        <div class="text-center">
                            <button class="btn btn-primary btn-massive w-100 shine-effect" id="createGroupBtn">
                                🚀 Start a New Meeting
                            </button>
                            <p class="mt-3 text-secondary small">You will get a unique 6-letter code to share.</p>
                        </div>

                        <div class="option-divider">
                            <span>OR</span>
                        </div>

                        <!-- Join Section -->
                        <div class="join-section">
                            <div class="form-group">
                                <label class="text-secondary mb-2 d-block text-center fw-bold">Enter Meeting Code</label>
                                <input type="text" id="groupCodeInput" class="form-control code-input mb-4" 
                                       placeholder="ABCDEF" maxlength="6" autocomplete="off">
                                <button class="btn btn-outline-primary btn-massive w-100" id="joinGroupBtn">
                                    🤝 Join Meeting
                                </button>
                            </div>
                        </div>

                        <!-- Success Section (Hidden) -->
                        <div id="successInfo" class="mt-5 p-4 rounded-4 bg-success bg-opacity-10 border border-success border-opacity-20 d-none">
                            <h4 class="text-success mb-2 text-center">Meeting Created! 🎉</h4>
                            <div class="d-flex align-items-center justify-content-center gap-3">
                                <h1 class="mb-0" id="generatedCodeDisplay" style="letter-spacing: 0.5rem; font-weight: 900;">------</h1>
                                <button class="btn btn-sm btn-success" onclick="copyCode()">Copy</button>
                            </div>
                            <button class="btn btn-success w-100 mt-4" id="enterMeetingBtn">Enter Study Room</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- FocusBot Robot Companion -->
    <div id="focusBot" class="focus-bot d-none">
        <div class="robot-head">
            <div class="robot-eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
        <div class="robot-body"></div>
    </div>

    <!-- Logic -->
    <script src="js/auth.js?v=11"></script>
    <script src="js/particles.js?v=10"></script>
    <script src="js/focusbot.js?v=1"></script>
    
    <script>
        let currentCode = "";

        // Copy Code utility
        function copyCode() {
            navigator.clipboard.writeText(currentCode);
            alert("Code copied to clipboard!");
        }

        // CREATE Group
        document.getElementById('createGroupBtn').addEventListener('click', async () => {
            try {
                const btn = document.getElementById('createGroupBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Generating Code...';

                const res = await authenticatedFetch(`${API_URL}/api/groups/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                if (!res.ok) throw new Error("Failed to create group");

                const data = await res.json();
                currentCode = data.meeting_code;

                // UI Update
                document.getElementById('generatedCodeDisplay').textContent = currentCode;
                document.querySelector('.text-center').classList.add('d-none');
                document.querySelector('.option-divider').classList.add('d-none');
                document.querySelector('.join-section').classList.add('d-none');
                document.getElementById('successInfo').classList.remove('d-none');

            } catch (error) {
                alert(error.message);
                document.getElementById('createGroupBtn').disabled = false;
                document.getElementById('createGroupBtn').innerHTML = '🚀 Start a New Meeting';
            }
        });

        // JOIN Group
        document.getElementById('joinGroupBtn').addEventListener('click', async () => {
            const codeInput = document.getElementById('groupCodeInput');
            const code = codeInput.value.trim().toUpperCase();

            if (code.length !== 6) {
                alert("Please enter a valid 6-letter code.");
                return;
            }

            try {
                const res = await authenticatedFetch(`${API_URL}/api/groups/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });

                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.detail || "Could not join group");
                }

                // Success - Redirect to study page with code
                window.location.href = `study.html?group=${code}`;

            } catch (error) {
                alert(error.message);
            }
        });

        // Enter Meeting (after create)
        document.getElementById('enterMeetingBtn').addEventListener('click', () => {
            window.location.href = `study.html?group=${currentCode}`;
        });
    </script>
    <script src='js/i18n.js'></script>
</body>
</html>
