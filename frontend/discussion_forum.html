<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discussion Forum - FocusFlow | Private messaging between students and teachers">
    <title>Discussion Forum - FocusFlow</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css?v=10">

    <style>
        /* ── Forum Layout ── */
        .forum-layout {
            display: flex;
            height: calc(100vh - 0px);
            overflow: hidden;
            background: var(--bg-primary, #0f1117);
        }

        /* ── Contacts Sidebar ── */
        .contacts-panel {
            width: 300px;
            min-width: 300px;
            background: var(--bg-secondary, #1a1d27);
            border-right: 1px solid rgba(255,255,255,0.07);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .contacts-header {
            padding: 1.5rem 1.25rem 1rem;
            background: var(--bg-card, #1e2235);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .contacts-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .contacts-search {
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary, #1a1d27);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .contacts-search input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            color: #fff;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .contacts-search input:focus {
            border-color: #6c63ff;
        }

        .contacts-search input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .contacts-list::-webkit-scrollbar { width: 4px; }
        .contacts-list::-webkit-scrollbar-track { background: transparent; }
        .contacts-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
            position: relative;
        }

        .contact-item:hover {
            background: rgba(108, 99, 255, 0.08);
        }

        .contact-item.active {
            background: rgba(108, 99, 255, 0.15);
            border-left-color: #6c63ff;
        }

        .contact-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
            position: relative;
        }

        .contact-avatar.student {
            background: linear-gradient(135deg, #6c63ff, #9c56f0);
            color: #fff;
        }

        .contact-avatar.teacher {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: #fff;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-role-badge {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 1px 6px;
            border-radius: 6px;
        }

        .contact-role-badge.student {
            background: rgba(108, 99, 255, 0.2);
            color: #a78bfa;
        }

        .contact-role-badge.teacher {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .unread-badge {
            background: #6c63ff;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            flex-shrink: 0;
        }

        /* ── Chat Area ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary, #0f1117);
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 1.75rem;
            background: var(--bg-card, #1e2235);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        .chat-header-info h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }

        .chat-header-info small {
            color: rgba(255,255,255,0.4);
            font-size: 0.78rem;
        }

        .back-to-dashboard {
            margin-left: auto;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6);
            border-radius: 8px;
            padding: 0.4rem 0.9rem;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-to-dashboard:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
        }

        /* ── Messages ── */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .messages-container::-webkit-scrollbar { width: 4px; }
        .messages-container::-webkit-scrollbar-track { background: transparent; }
        .messages-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .message-wrapper {
            display: flex;
            gap: 0.6rem;
            align-items: flex-end;
        }

        .message-wrapper.me {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-bottom: 4px;
        }

        .msg-avatar.me-avatar {
            background: linear-gradient(135deg, #6c63ff, #9c56f0);
            color: #fff;
        }

        .msg-avatar.them-avatar {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: #fff;
        }

        .message-bubble {
            width: fit-content;
            max-width: 85%;
            min-width: 60px;
            padding: 0.65rem 1rem;
            border-radius: 18px;
            font-size: 0.875rem;
            line-height: 1.5;
            word-break: normal;
            overflow-wrap: anywhere;
            position: relative;
        }


        .message-wrapper.me .message-bubble {
            background: linear-gradient(135deg, #6c63ff, #9c56f0);
            color: #fff;
            border-bottom-right-radius: 5px;
        }

        .message-wrapper.them .message-bubble {
            background: var(--bg-card, #1e2235);
            color: rgba(255,255,255,0.9);
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255,255,255,0.07);
        }

        .message-time {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.35);
            margin-top: 3px;
            text-align: right;
        }

        .message-wrapper.them .message-time {
            text-align: left;
        }

        /* ── Empty / Placeholder states ── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            text-align: center;
            padding: 2rem;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.5);
        }

        .empty-state p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.3);
            max-width: 300px;
        }

        /* ── Message Input ── */
        .message-input-area {
            padding: 1rem 1.75rem;
            background: var(--bg-card, #1e2235);
            border-top: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        .message-input-form {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .message-input-wrapper {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 0.65rem 1.25rem;
            transition: border-color 0.2s;
        }

        .message-input-wrapper:focus-within {
            border-color: #6c63ff;
        }

        .message-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .message-input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6c63ff, #9c56f0);
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, opacity 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.08);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Date separators ── */
        .date-separator {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 0.5rem 0;
        }

        .date-separator::before,
        .date-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.07);
        }

        .date-separator span {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.3);
            white-space: nowrap;
            font-weight: 500;
        }

        /* ── No contacts state ── */
        .no-contacts {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
            color: rgba(255,255,255,0.3);
        }

        .no-contacts .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .no-contacts p { font-size: 0.82rem; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .contacts-panel {
                width: 70px;
                min-width: 70px;
            }
            .contact-info, .contacts-search, .contacts-header h2 span:last-child { display: none; }
            .contact-item { padding: 0.75rem; justify-content: center; }
            .contact-avatar { width: 38px; height: 38px; font-size: 0.85rem; }
        }

        /* Loading pulse animation */
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .loading-dot {
            display: inline-flex;
            gap: 5px;
        }
        .loading-dot span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            animation: pulse 1.2s infinite;
        }
        .loading-dot span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot span:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>

<body>
    <div class="forum-layout">

        <!-- ── Left: Contacts Panel ── -->
        <div class="contacts-panel">
            <div class="contacts-header">
                <h2>
                    <span>💬</span>
                    <span>Discussion Forum</span>
                </h2>
            </div>
            <div class="contacts-search">
                <input type="text" id="searchInput" placeholder="🔍  Search contacts..." oninput="filterContacts(this.value)">
            </div>
            <div class="contacts-list" id="contactsList">
                <div class="no-contacts">
                    <div class="icon">⏳</div>
                    <p>Loading contacts...</p>
                </div>
            </div>
        </div>

        <!-- ── Right: Chat Area ── -->
        <div class="chat-area">
            <!-- Chat Header -->
            <div class="chat-header" id="chatHeader">
                <div class="contact-avatar student" id="chatAvatar" style="width:38px;height:38px;font-size:0.95rem;">?</div>
                <div class="chat-header-info">
                    <h3 id="chatName">Select a conversation</h3>
                    <small id="chatRole">Choose someone from the left to start chatting</small>
                </div>
                <a id="backBtn" href="student_dashboard.html" class="back-to-dashboard">← Back</a>
            </div>

            <!-- Messages -->
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div class="icon">💭</div>
                    <h4>No conversation selected</h4>
                    <p>Pick a contact on the left to view your private messages.</p>
                </div>
            </div>

            <!-- Input -->
            <div class="message-input-area" id="messageInputArea" style="display:none;">
                <form class="message-input-form" id="messageForm" onsubmit="sendMessage(event)">
                    <div class="message-input-wrapper">
                        <input
                            type="text"
                            id="messageInput"
                            class="message-input"
                            placeholder="Type a message and press Enter to send..."
                            maxlength="2000"
                            autocomplete="off"
                        >
                    </div>
                    <button type="submit" class="send-btn" id="sendBtn" title="Send Message">➤</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auth + Chat JS -->
    <script src="js/auth.js?v=10"></script>
    <script src="js/chat.js?v=1"></script>
    <script src='js/i18n.js'></script>
</body>

</html>
